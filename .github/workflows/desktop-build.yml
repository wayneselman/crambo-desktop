name: Build Crambo Desktop

on:
  push:
    branches: [main]
    paths:
      - "crambo-desktop/**"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "crambo-desktop/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: crambo-desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: crambo-desktop/src-tauri
          key: clean-v1

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pkg-config opus cmake
          echo "PKG_CONFIG_PATH=/usr/local/opt/opus/lib/pkgconfig:/opt/homebrew/opt/opus/lib/pkgconfig:$(brew --prefix opus)/lib/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "OPUS_NO_PKG_CONFIG=0" >> $GITHUB_ENV

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Install dependencies (npm)
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          PKG_CONFIG_PATH: /usr/local/opt/opus/lib/pkgconfig:/opt/homebrew/opt/opus/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
          OPUS_NO_PKG_CONFIG: "0"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crambo-desktop
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crambo-desktop-${{ matrix.target }}
          path: |
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.dmg
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.app
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.exe
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.msi
          retention-days: 30
