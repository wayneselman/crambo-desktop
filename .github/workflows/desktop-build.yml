name: Build Crambo Desktop

on:
  push:
    branches: [main]
    paths:
      - "crambo-desktop/**"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "crambo-desktop/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: crambo-desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: crambo-desktop/src-tauri
          key: clean-v1

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pkg-config opus cmake
          echo "PKG_CONFIG_PATH=/usr/local/opt/opus/lib/pkgconfig:/opt/homebrew/opt/opus/lib/pkgconfig:$(brew --prefix opus)/lib/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "OPUS_NO_PKG_CONFIG=0" >> $GITHUB_ENV

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Install dependencies (npm)
        run: npm ci

      - name: Build Tauri app (sign only, skip notarization)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          PKG_CONFIG_PATH: /usr/local/opt/opus/lib/pkgconfig:/opt/homebrew/opt/opus/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
          OPUS_NO_PKG_CONFIG: "0"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crambo-desktop
          args: ${{ matrix.args }}

      - name: Notarize macOS app
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find src-tauri/target -name "Crambo.app" -path "*/release/bundle/macos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found, skipping notarization"
            exit 0
          fi
          echo "Found app at: $APP_PATH"
          ZIP_PATH="/tmp/Crambo-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt of 3..."
            if xcrun notarytool submit "$ZIP_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 10m 2>&1; then
              echo "Notarization succeeded!"
              xcrun stapler staple "$APP_PATH"
              echo "Stapled notarization ticket to app"
              exit 0
            else
              echo "Attempt $attempt failed, waiting 30s before retry..."
              sleep 30
            fi
          done
          echo "WARNING: Notarization failed after 3 attempts. App is signed but not notarized."
          echo "You can notarize locally with: xcrun notarytool submit Crambo.zip --apple-id YOUR_ID --password YOUR_APP_PASSWORD --team-id YOUR_TEAM_ID --wait"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crambo-desktop-${{ matrix.target }}
          path: |
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.dmg
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.app
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.exe
            crambo-desktop/src-tauri/target/**/release/bundle/**/*.msi
          retention-days: 30
